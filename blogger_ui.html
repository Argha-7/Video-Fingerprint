<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Fingerprint Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --accent: #0ea5e9;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(14, 165, 233, 0.15) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .glass-card { grid-template-columns: 1fr; }
        }

        .sidebar {
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding-right: 1.5rem;
        }

        @media (max-width: 768px) {
            .sidebar { border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-right: 0; padding-bottom: 1.5rem; }
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
        }

        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-container {
            margin-top: 2rem;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            display: none;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
            background: #475569;
        }

        .status-dot.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        .status-dot.completed {
            background: #10b981;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .download-box {
            margin-top: 1.5rem;
            text-align: center;
            display: none;
        }

        .download-btn {
            display: inline-block;
            background: #10b981;
            color: white;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .download-btn:hover {
            background: #059669;
            transform: scale(1.05);
        }

        #error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <div class="sidebar">
            <h1>Video Pro</h1>
            <div class="input-group">
                <label>GitHub Username</label>
                <input type="text" id="gh-user" placeholder="e.g. ArghaUser">
            </div>
            <div class="input-group">
                <label>Repository Name</label>
                <input type="text" id="gh-repo" placeholder="video_fingerprint">
            </div>
            <div class="input-group">
                <label>Personal Access Token</label>
                <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
            </div>
        </div>
        
        <div class="main-content">
            <div class="input-group">
                <label>YouTube Video URL</label>
                <input type="text" id="video-url" placeholder="https://youtube.com/watch?v=...">
            </div>
            <button class="btn-primary" id="start-btn">Modify Fingerprint</button>
            <div id="error-msg"></div>

            <div class="status-container" id="status-panel">
                <div class="status-item" id="step-trigger">
                    <div class="status-dot"></div>
                    <span>Triggering GitHub Action...</span>
                </div>
                <div class="status-item" id="step-process">
                    <div class="status-dot"></div>
                    <span>Processing & Re-encoding (Estimated 2-5 mins)</span>
                </div>
                <div class="status-item" id="step-upload">
                    <div class="status-dot"></div>
                    <span>Creating Release...</span>
                </div>
            </div>

            <div class="download-box" id="download-panel">
                <p style="margin-bottom: 1rem; font-size: 0.9rem;">Success! Your video is ready.</p>
                <a href="#" class="download-btn" id="dl-link">Download Modified Video</a>
            </div>
        </div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const statusPanel = document.getElementById('status-panel');
    const downloadPanel = document.getElementById('download-panel');
    const errorMsg = document.getElementById('error-msg');

    const steps = {
        trigger: document.getElementById('step-trigger'),
        process: document.getElementById('step-process'),
        upload: document.getElementById('step-upload')
    };

    function updateStep(stepId, state) {
        const step = steps[stepId];
        const dot = step.querySelector('.status-dot');
        dot.className = 'status-dot ' + state;
    }

    startBtn.addEventListener('click', async () => {
        const user = document.getElementById('gh-user').value.trim();
        const repo = document.getElementById('gh-repo').value.trim();
        const token = document.getElementById('gh-token').value.trim();
        const url = document.getElementById('video-url').value.trim();

        if (!user || !repo || !token || !url) {
            alert('Please fill all fields!');
            return;
        }

        // Reset UI
        errorMsg.style.display = 'none';
        downloadPanel.style.display = 'none';
        statusPanel.style.display = 'block';
        startBtn.disabled = true;
        updateStep('trigger', 'active');
        updateStep('process', '');
        updateStep('upload', '');

        try {
            // 1. Trigger Workflow
            const triggerUrl = `https://api.github.com/repos/${user}/${repo}/actions/workflows/modify_fingerprint_action.yml/dispatches`;
            const response = await fetch(triggerUrl, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ ref: 'main', inputs: { video_url: url } })
            });

            if (!response.ok) throw new Error('GitHub API Error: ' + response.statusText);

            updateStep('trigger', 'completed');
            updateStep('process', 'active');

            // 2. Poll Status
            pollStatus(user, repo, token);

        } catch (err) {
            errorMsg.innerText = err.message;
            errorMsg.style.display = 'block';
            startBtn.disabled = false;
        }
    });

    async function pollStatus(user, repo, token) {
        const runsUrl = `https://api.github.com/repos/${user}/${repo}/actions/runs?per_page=1`;
        
        const interval = setInterval(async () => {
            try {
                const res = await fetch(runsUrl, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const latestRun = data.workflow_runs[0];

                if (latestRun && latestRun.status === 'completed') {
                    clearInterval(interval);
                    updateStep('process', 'completed');
                    updateStep('upload', 'completed');
                    
                    const dlUrl = `https://github.com/${user}/${repo}/releases/download/latest/modified_video.mp4?t=${Date.now()}`;
                    document.getElementById('dl-link').href = dlUrl;
                    downloadPanel.style.display = 'block';
                    startBtn.disabled = false;
                }
            } catch (err) {
                console.error('Polling error:', err);
            }
        }, 10000); // Check every 10 seconds
    }
</script>

</body>
</html>
