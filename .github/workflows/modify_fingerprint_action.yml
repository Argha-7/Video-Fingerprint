name: Modify Video Fingerprint

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      vocal_mask:
        description: 'Vocal Masking (Inaudible)'
        required: false
        type: boolean
        default: false
      harmonic_alter:
        description: 'Harmonic Alteration (Voice Mutation)'
        required: false
        type: boolean
        default: false

jobs:
  modify-fingerprint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp

      - name: Modify Video Fingerprint
        run: |
          ARGS="${{ github.event.inputs.video_url }}"
          if [ "${{ github.event.inputs.vocal_mask }}" = "true" ]; then ARGS="$ARGS --vocal-mask"; fi
          if [ "${{ github.event.inputs.harmonic_alter }}" = "true" ]; then ARGS="$ARGS --harmonic-alter"; fi
          python github_runner.py $ARGS

      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure we are on a clean state for the tag
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          
          # Create nre release with asset
          gh release create latest modified_video.mp4 modified_audio.mp3 --title "Latest Creation" --notes "Video and MP3 modified on $(date)"

