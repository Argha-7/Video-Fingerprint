name: Modify Video Fingerprint

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string

jobs:
  modify-fingerprint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp

      - name: Modify Video Fingerprint
        run: |
          python github_runner.py "${{ github.event.inputs.video_url }}"

      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure we are on a clean state for the tag
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          
          # Create nre release with asset
          gh release create latest modified_video.mp4 --title "Latest Video" --notes "Fingerprint modified on $(date)"

